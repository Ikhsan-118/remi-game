<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Remi — Buat / Gabung Ruang</title>
<style>
  :root {
    --felt-dark:    #0D3B2E;
    --felt-light:   #144A38;
    --felt-edge:    #0A2B21;
    --gold:         #D4AF37;
    --gold-dim:     #8A7530;
    --cream:        #F2E9D8;
    --cream-dim:    #C9BEA6;
    --card-red:     #C23B3B;
    --green-ready:  #4ade80;
    --font-display: 'Source Serif Pro', Georgia, serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-mono);
    background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt-dark) 55%, var(--felt-edge) 100%);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card-panel {
    width: 100%;
    max-width: 440px;
    background: rgba(10, 30, 24, 0.92);
    border: 1px solid var(--gold-dim);
    border-radius: 14px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .title {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    color: var(--cream-dim);
    margin-bottom: 26px;
    letter-spacing: 0.04em;
  }

  .tabs { display: flex; gap: 8px; margin-bottom: 22px; }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 8px;
    border: 1px solid var(--gold-dim);
    color: var(--cream-dim);
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    font-family: var(--font-mono);
  }
  .tab.active { background: rgba(212,175,55,0.15); border-color: var(--gold); color: var(--gold); }
  .tab:hover:not(.active) { border-color: var(--cream-dim); color: var(--cream); }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    color: var(--cream);
    font-family: var(--font-mono);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .field input:focus { border-color: var(--gold); }
  .field input#joinCode { letter-spacing: 0.15em; text-transform: uppercase; }

  .panel-section { display: none; }
  .panel-section.active { display: block; }

  .options-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .option-chip {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    cursor: pointer;
    color: var(--cream-dim);
    transition: all 0.2s ease;
    font-family: var(--font-mono);
  }
  .option-chip.selected { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }
  .option-chip:hover:not(.selected) { border-color: var(--cream-dim); color: var(--cream); }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 0 20px rgba(212,175,55,0.4); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .error-msg {
    color: var(--card-red);
    font-size: 12px;
    text-align: center;
    margin-top: 12px;
    min-height: 16px;
  }

  /* ───────── LOBBY (waiting room) ───────── */
  #lobbyView { display: none; }

  .lobby-code {
    text-align: center;
    margin-bottom: 22px;
  }
  .lobby-code .label { font-size: 11px; color: var(--cream-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .lobby-code .code {
    font-family: var(--font-display);
    font-size: 42px;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin: 6px 0;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .lobby-code .code:hover { opacity: 0.8; }
  .lobby-code .hint { font-size: 11px; color: var(--cream-dim); }
  .lobby-code .copy-hint { font-size: 10px; color: var(--gold-dim); margin-top: 3px; }

  .player-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .player-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    font-size: 13px;
    transition: border-color 0.2s;
  }
  .player-row.me { border-color: rgba(212,175,55,0.3); }
  .player-row .pname { display: flex; align-items: center; gap: 8px; }
  .player-row .host-tag {
    font-size: 9px;
    color: var(--gold);
    border: 1px solid var(--gold-dim);
    padding: 1px 6px;
    border-radius: 8px;
  }
  .player-row .me-tag {
    font-size: 9px;
    color: var(--cream-dim);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 1px 6px;
    border-radius: 8px;
  }
  .player-row .ready-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cream-dim);
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .player-row .ready-dot.ready { background: var(--green-ready); box-shadow: 0 0 6px var(--green-ready); }
  .player-row .disconnected { color: var(--card-red); font-size: 10px; }

  .lobby-status {
    text-align: center;
    font-size: 11px;
    color: var(--cream-dim);
    margin-bottom: 16px;
    min-height: 16px;
    letter-spacing: 0.03em;
  }
  .lobby-status.warn { color: var(--gold); }

  .lobby-actions { display: flex; gap: 10px; }
  .btn-secondary {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    color: var(--cream-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-secondary:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-secondary.active-ready { border-color: var(--green-ready); color: var(--green-ready); }
  .btn-secondary.btn-start-active {
    background: rgba(212,175,55,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }
  .btn-secondary.btn-start-active:hover { background: var(--gold); color: #1a1a1a; }

  .connection-status {
    text-align: center;
    font-size: 10px;
    color: var(--cream-dim);
    margin-top: 18px;
    letter-spacing: 0.05em;
  }
  .connection-status.online::before  { content: '● '; color: var(--green-ready); }
  .connection-status.offline::before { content: '● '; color: var(--card-red); }
</style>
</head>
<body>

<div class="card-panel">

  <!-- ═══════ FORM CREATE/JOIN ═══════ -->
  <div id="formView">
    <div class="title">🃏 Remi</div>
    <div class="subtitle">Permainan Kartu Remi Indonesia</div>

    <div class="tabs">
      <button class="tab active" id="tabCreate" onclick="switchTab('create')">Buat Ruang</button>
      <button class="tab"        id="tabJoin"   onclick="switchTab('join')">Gabung Ruang</button>
    </div>

    <div class="field">
      <label>Nama Kamu</label>
      <input type="text" id="playerName" placeholder="Masukkan nama..." maxlength="20"
             onkeydown="if(event.key==='Enter') activeTab==='create'?doCreateRoom():doJoinRoom()">
    </div>

    <!-- CREATE -->
    <div class="panel-section active" id="createSection">
      <div class="options-row">
        <div class="option-chip selected" data-mode="traditional" onclick="selectMode(this,'traditional')">Tradisional</div>
        <div class="option-chip"          data-mode="tournament"  onclick="selectMode(this,'tournament')">Turnamen</div>
      </div>
      <div class="options-row">
        <div class="option-chip"          data-joker="false" onclick="selectJoker(this,false)">Tanpa Joker</div>
        <div class="option-chip selected" data-joker="true"  onclick="selectJoker(this,true)">Dengan Joker</div>
      </div>
      <button class="btn-primary" id="btnCreate" onclick="doCreateRoom()">Buat Ruang Baru</button>
    </div>

    <!-- JOIN -->
    <div class="panel-section" id="joinSection">
      <div class="field">
        <label>Kode Undangan</label>
        <input type="text" id="joinCode" placeholder="Contoh: ABCDE" maxlength="5"
               oninput="this.value=this.value.toUpperCase()"
               onkeydown="if(event.key==='Enter') doJoinRoom()">
      </div>
      <button class="btn-primary" id="btnJoin" onclick="doJoinRoom()">Gabung ke Ruang</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="connection-status offline" id="connStatus">Menghubungkan ke server...</div>
  </div>

  <!-- ═══════ LOBBY / WAITING ROOM ═══════ -->
  <div id="lobbyView">
    <div class="lobby-code">
      <div class="label">Kode Ruang — Bagikan ke teman</div>
      <div class="code" id="lobbyCodeDisplay" onclick="copyCode()" title="Klik untuk salin">-----</div>
      <div class="hint">Minimal 2 pemain untuk mulai</div>
      <div class="copy-hint" id="copyHint">Klik kode untuk menyalin</div>
    </div>

    <div class="player-list" id="playerList"></div>

    <div class="lobby-status" id="lobbyStatus">Menunggu semua pemain siap...</div>

    <div class="lobby-actions">
      <button class="btn-secondary" id="btnReady" onclick="toggleReady()">Siap Main</button>
      <button class="btn-secondary" id="btnStart" onclick="doStartGame()" style="display:none;" disabled>
        Mulai Permainan
      </button>
      <button class="btn-secondary" id="btnLeave" onclick="doLeaveRoom()">Keluar</button>
    </div>

    <div class="error-msg" id="lobbyError"></div>
  </div>

</div>

<script src="client.js"></script>
<script>
let selectedMode = 'traditional';
let selectedJoker = true;
let activeTab = 'create';
let amHost = false;
let myReady = false;
let myId = null;

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabCreate').classList.toggle('active', tab === 'create');
  document.getElementById('tabJoin').classList.toggle('active', tab === 'join');
  document.getElementById('createSection').classList.toggle('active', tab === 'create');
  document.getElementById('joinSection').classList.toggle('active', tab === 'join');
}

function selectMode(el, mode) {
  document.querySelectorAll('[data-mode]').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedMode = mode;
}
function selectJoker(el, val) {
  document.querySelectorAll('[data-joker]').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedJoker = val;
}

function showError(msg, target = 'errorMsg') {
  const el = document.getElementById(target);
  if (!el) return;
  el.textContent = msg;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.textContent = ''; }, 4000);
}

function setFormLoading(loading) {
  document.getElementById('btnCreate').disabled = loading;
  document.getElementById('btnJoin').disabled = loading;
}

function doCreateRoom() {
  const name = document.getElementById('playerName').value.trim();
  if (!name) return showError('Masukkan nama kamu dulu');
  setFormLoading(true);
  RemiClient.createRoom(name, { mode: selectedMode, useJokers: selectedJoker, maxPlayers: 4 });
}

function doJoinRoom() {
  const name = document.getElementById('playerName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (!name) return showError('Masukkan nama kamu dulu');
  if (!code) return showError('Masukkan kode undangan');
  if (code.length !== 5) return showError('Kode undangan harus 5 karakter');
  setFormLoading(true);
  RemiClient.joinRoom(code, name);
}

function toggleReady() {
  myReady = !myReady;
  RemiClient.setReady(myReady);
  const btn = document.getElementById('btnReady');
  btn.textContent = myReady ? '✓ Siap' : 'Siap Main';
  btn.classList.toggle('active-ready', myReady);
}

function doStartGame() {
  RemiClient.startGame();
}

function doLeaveRoom() {
  if (confirm('Yakin ingin keluar dari ruang ini?')) {
    RemiClient.leaveRoom();
    showFormView();
  }
}

function copyCode() {
  const code = document.getElementById('lobbyCodeDisplay').textContent;
  if (!code || code === '-----') return;
  navigator.clipboard.writeText(code).then(() => {
    document.getElementById('copyHint').textContent = '✓ Tersalin!';
    setTimeout(() => { document.getElementById('copyHint').textContent = 'Klik kode untuk menyalin'; }, 2000);
  }).catch(() => {
    // Fallback untuk browser yang tidak mendukung clipboard API
    document.getElementById('copyHint').textContent = `Salin manual: ${code}`;
  });
}

function showFormView() {
  document.getElementById('formView').style.display = 'block';
  document.getElementById('lobbyView').style.display = 'none';
  myReady = false;
  amHost = false;
  setFormLoading(false);
}

function renderLobby(room) {
  document.getElementById('formView').style.display = 'none';
  document.getElementById('lobbyView').style.display = 'block';
  document.getElementById('lobbyCodeDisplay').textContent = room.code;

  myId = RemiClient.getSession().playerId;
  amHost = room.hostId === myId;

  // Render daftar pemain
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  room.players.forEach(p => {
    const row = document.createElement('div');
    const isMe = p.id === myId;
    row.className = 'player-row' + (isMe ? ' me' : '');
    row.innerHTML = `
      <div class="pname">
        <div class="ready-dot ${p.ready ? 'ready' : ''}"></div>
        <span>${p.name}</span>
        ${p.isHost ? '<span class="host-tag">HOST</span>' : ''}
        ${isMe ? '<span class="me-tag">Kamu</span>' : ''}
      </div>
      <div>
        ${!p.connected ? '<span class="disconnected">⚠ putus koneksi</span>' : 
          (p.ready ? '<span style="font-size:11px;color:#4ade80;">Siap ✓</span>' : 
                     '<span style="font-size:11px;color:var(--cream-dim);">Belum siap</span>')}
      </div>
    `;
    list.appendChild(row);
  });

  // Sinkronisasi status ready tombol saya
  const me = room.players.find(p => p.id === myId);
  if (me) {
    myReady = me.ready;
    const btnReady = document.getElementById('btnReady');
    btnReady.textContent = myReady ? '✓ Siap' : 'Siap Main';
    btnReady.classList.toggle('active-ready', myReady);
  }

  // Tombol Mulai hanya untuk host
  const btnStart = document.getElementById('btnStart');
  btnStart.style.display = amHost ? 'block' : 'none';

  // Cek apakah semua siap & cukup pemain
  const allReady    = room.players.length >= 2 && room.players.every(p => p.ready);
  const canStart    = amHost && allReady;
  btnStart.disabled = !canStart;
  btnStart.classList.toggle('btn-start-active', canStart);

  // Pesan status
  const statusEl = document.getElementById('lobbyStatus');
  const totalPlayers = room.players.length;
  const readyCount   = room.players.filter(p => p.ready).length;

  if (totalPlayers < 2) {
    statusEl.textContent = 'Menunggu pemain lain bergabung...';
    statusEl.className = 'lobby-status warn';
  } else if (!allReady) {
    statusEl.textContent = `${readyCount}/${totalPlayers} pemain siap — menunggu yang lain...`;
    statusEl.className = 'lobby-status';
  } else if (amHost) {
    statusEl.textContent = 'Semua siap! Klik Mulai Permainan.';
    statusEl.className = 'lobby-status warn';
  } else {
    statusEl.textContent = 'Semua siap! Menunggu host memulai...';
    statusEl.className = 'lobby-status';
  }
}

// ───────── WebSocket events ─────────
RemiClient.on('connected', () => {
  document.getElementById('connStatus').textContent = 'Terhubung ke server';
  document.getElementById('connStatus').className = 'connection-status online';
  setFormLoading(false);
});

RemiClient.on('disconnected', () => {
  document.getElementById('connStatus').textContent = 'Koneksi putus — mencoba lagi...';
  document.getElementById('connStatus').className = 'connection-status offline';
  setFormLoading(false);
});

RemiClient.on('room_created', (msg) => {
  myId = msg.playerId;
  renderLobby(msg.room);
});
RemiClient.on('room_joined',  (msg) => {
  myId = msg.playerId;
  renderLobby(msg.room);
});
RemiClient.on('lobby_update', (msg) => renderLobby(msg.room));

RemiClient.on('reconnected', (msg) => {
  myId = RemiClient.getSession().playerId;
  if (msg.snapshot && msg.room.status === 'PLAYING') {
    // Sedang di tengah permainan → redirect ke meja
    window.location.href = 'game.html';
  } else if (msg.room) {
    renderLobby(msg.room);
  }
});

RemiClient.on('game_started', () => {
  window.location.href = 'game.html';
});

RemiClient.on('error', (msg) => {
  const inLobby = document.getElementById('lobbyView').style.display !== 'none';
  showError(msg.message, inLobby ? 'lobbyError' : 'errorMsg');
  setFormLoading(false);
});

RemiClient.connect();
</script>
</body>
</html>
