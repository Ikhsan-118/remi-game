<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Remi — Meja Permainan</title>
<style>
  :root {
    --felt-dark:    #0D3B2E;
    --felt-light:   #144A38;
    --felt-edge:    #0A2B21;
    --gold:         #D4AF37;
    --gold-dim:     #8A7530;
    --cream:        #F2E9D8;
    --cream-dim:    #C9BEA6;
    --card-red:     #C23B3B;
    --card-black:   #1A1A1A;
    --card-face:    #FBF8F0;
    --panel-bg:     rgba(10, 30, 24, 0.88);
    --shadow-deep:  rgba(0, 0, 0, 0.55);
    --font-display: 'Source Serif Pro', Georgia, serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-mono);
    background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt-dark) 55%, var(--felt-edge) 100%);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* subtle felt texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.025) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.02) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .table-wrap {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 14px 14px 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ───────── TOP BAR ───────── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--panel-bg);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .room-info { display: flex; flex-direction: column; gap: 2px; }
  .room-info .label { font-size: 10px; letter-spacing: 0.12em; color: var(--cream-dim); text-transform: uppercase; }
  .room-info .code { font-family: var(--font-display); font-size: 18px; color: var(--gold); letter-spacing: 0.06em; }

  .turn-indicator {
    font-family: var(--font-display);
    font-size: 15px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--gold-dim);
    background: rgba(212, 175, 55, 0.08);
    color: var(--cream);
    transition: all 0.3s ease;
  }
  .turn-indicator.my-turn {
    background: rgba(212, 175, 55, 0.22);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 16px rgba(212,175,55,0.25);
  }

  .phase-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream-dim);
    text-align: right;
  }
  .phase-tag .phase-name { color: var(--gold); display: block; font-size: 13px; margin-top: 2px; }

  /* ───────── OPPONENTS ROW ───────── */
  .opponents-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 10px 0 18px;
    flex-wrap: wrap;
  }
  .opponent {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.85;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .opponent.active-turn { opacity: 1; transform: translateY(-3px); }
  .opponent .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--felt-light), var(--felt-edge));
    border: 2px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 16px; color: var(--gold);
  }
  .opponent.active-turn .avatar { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.4); }
  .opponent .name { font-size: 11px; color: var(--cream-dim); }
  .opponent .hand-mini { display: flex; gap: -8px; }
  .opponent .mini-card {
    width: 14px; height: 20px;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    margin-left: -6px;
  }
  .opponent .mini-card:first-child { margin-left: 0; }
  .opponent .disconnected-tag {
    font-size: 9px; color: var(--card-red); letter-spacing: 0.05em;
  }

  /* ───────── CENTER TABLE AREA ───────── */
  .center-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 10px 0 20px;
  }

  .piles-row {
    display: flex;
    align-items: center;
    gap: 48px;
  }

  .pile-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .pile-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cream-dim); }

  /* Stock pile */
  .stock-pile {
    position: relative;
    width: 58px; height: 82px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .stock-pile:hover { transform: translateY(-2px); }
  .stock-pile .stack-card {
    position: absolute;
    width: 58px; height: 82px;
    border-radius: 6px;
    background: linear-gradient(135deg, #232323, #161616);
    border: 1px solid var(--gold-dim);
    box-shadow: 0 4px 10px var(--shadow-deep);
  }
  .stock-pile .stack-card::after {
    content: '◆';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold-dim);
    font-size: 18px;
    opacity: 0.5;
  }
  .stock-count {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--gold);
  }

  /* Discard pile — cascading */
  .discard-pile {
    position: relative;
    width: 110px; height: 86px;
  }
  .discard-pile .dcard {
    position: absolute;
    width: 58px; height: 82px;
    transition: transform 0.2s ease;
  }
  .discard-pile .dcard:nth-last-child(1) { left: 26px; top: 0; z-index: 3; }
  .discard-pile .dcard:nth-last-child(2) { left: 13px; top: 2px; z-index: 2; opacity: 0.85; }
  .discard-pile .dcard:nth-last-child(3) { left: 0; top: 4px; z-index: 1; opacity: 0.65; }
  .discard-pile .dcard.eatable { cursor: pointer; }
  .discard-pile .dcard.eatable:hover { transform: translateY(-6px) scale(1.04); }

  /* ───────── PLAYING CARD ───────── */
  .pcard {
    width: 58px; height: 82px;
    border-radius: 6px;
    background: var(--card-face);
    border: 1px solid rgba(0,0,0,0.15);
    box-shadow: 0 3px 6px var(--shadow-deep);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 5px 6px;
    font-family: var(--font-display);
    font-weight: 600;
  }
  .pcard.red   { color: var(--card-red); }
  .pcard.black { color: var(--card-black); }
  .pcard .rank { font-size: 16px; line-height: 1; }
  .pcard .suit { font-size: 16px; line-height: 1; align-self: flex-end; }
  .pcard .suit-big {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    opacity: 0.18;
  }
  .pcard.joker {
    background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
    color: #1a1a1a;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  /* ───────── MY HAND ───────── */
  .my-zone {
    background: var(--panel-bg);
    border-top: 1px solid var(--gold-dim);
    padding: 14px 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .my-melds {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    min-height: 0;
    padding: 0 4px;
  }
  .meld-group {
    display: flex;
    gap: -10px;
    padding: 4px;
    border-radius: 6px;
    background: rgba(212,175,55,0.06);
    border: 1px dashed var(--gold-dim);
  }
  .meld-group .pcard { width: 40px; height: 58px; margin-left: -14px; }
  .meld-group .pcard:first-child { margin-left: 0; }
  .meld-group .pcard .rank, .meld-group .pcard .suit { font-size: 11px; }

  .hand-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0;
    padding: 8px 0 4px;
    min-height: 96px;
  }
  .pcard.in-hand {
    margin-left: -18px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, margin-bottom 0.15s ease;
    position: relative;
  }
  .pcard.in-hand:first-child { margin-left: 0; }
  .pcard.in-hand:hover {
    transform: translateY(-8px);
    z-index: 5;
    box-shadow: 0 8px 14px var(--shadow-deep);
  }
  .pcard.in-hand.selected {
    transform: translateY(-16px);
    border: 2px solid var(--gold);
    box-shadow: 0 0 14px rgba(212,175,55,0.45), 0 8px 14px var(--shadow-deep);
    z-index: 6;
  }

  /* ───────── ACTION BAR ───────── */
  .action-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 4px;
  }
  .btn {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 11px 20px;
    border-radius: 24px;
    border: 1px solid var(--gold-dim);
    background: rgba(212,175,55,0.06);
    color: var(--cream-dim);
    cursor: not-allowed;
    opacity: 0.45;
    transition: all 0.2s ease;
  }
  .btn.enabled {
    cursor: pointer;
    opacity: 1;
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(212,175,55,0.12);
  }
  .btn.enabled:hover {
    background: var(--gold);
    color: #1a1a1a;
    box-shadow: 0 0 16px rgba(212,175,55,0.45);
  }
  .btn.danger.enabled { border-color: var(--card-red); color: var(--card-red); }
  .btn.danger.enabled:hover { background: var(--card-red); color: var(--cream); }

  .hint-text {
    text-align: center;
    font-size: 11px;
    color: var(--cream-dim);
    letter-spacing: 0.03em;
    min-height: 16px;
  }

  /* ───────── TOAST / LOG ───────── */
  .toast {
    position: fixed;
    bottom: 220px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(10,30,24,0.95);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 50;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 560px) {
    .pcard { width: 46px; height: 66px; }
    .pcard .rank, .pcard .suit { font-size: 13px; }
    .pcard.in-hand { margin-left: -22px; }
    .piles-row { gap: 28px; }
    .opponents-row { gap: 16px; }
    .btn { padding: 9px 14px; font-size: 11px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="table-wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="room-info">
      <span class="label">Kode Ruang</span>
      <span class="code" id="roomCode">RMI-7XQ2</span>
    </div>
    <div class="turn-indicator" id="turnIndicator">Giliran: Raps</div>
    <div class="phase-tag">
      Fase
      <span class="phase-name" id="phaseTag">Ambil Kartu</span>
    </div>
  </div>

  <!-- OPPONENTS -->
  <div class="opponents-row" id="opponentsRow"></div>

  <!-- CENTER TABLE -->
  <div class="center-area">
    <div class="piles-row">
      <div class="pile-block">
        <div class="stock-pile" id="stockPile" onclick="drawFromStock()">
          <div class="stack-card" style="transform: translateY(2px) translateX(2px); opacity:0.5;"></div>
          <div class="stack-card" style="transform: translateY(1px) translateX(1px); opacity:0.75;"></div>
          <div class="stack-card"></div>
        </div>
        <span class="stock-count" id="stockCount">37 kartu</span>
        <span class="pile-label">Stock</span>
      </div>

      <div class="pile-block">
        <div class="discard-pile" id="discardPile"></div>
        <span class="pile-label">Buangan</span>
      </div>
    </div>
  </div>

  <!-- MY ZONE -->
  <div class="my-zone">
    <div class="my-melds" id="myMelds"></div>

    <div class="hand-row" id="handRow"></div>

    <div class="hint-text" id="hintText">Ambil kartu dari stock atau buangan untuk mulai giliranmu.</div>

    <div class="action-bar">
      <button class="btn" id="btnMeld" onclick="attemptMeld()">Turun Seri</button>
      <button class="btn" id="btnDiscard" onclick="attemptDiscard()">Buang Kartu</button>
      <button class="btn danger" id="btnClose" onclick="attemptClose()">Tutup Game</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================
   STATE LOKAL (DUMMY) — UI INI MURNI PRESENTASI.
   Sambungkan fungsi-fungsi di bawah ke WebSocket client
   kamu (emit ke server, render ulang saat event diterima).
   ===================================================== */

const SUIT_COLOR = { '♠':'black', '♣':'black', '♥':'red', '♦':'red' };

let state = {
  myId: 'me',
  phase: 'DRAW',                 // DRAW | MELD | DISCARD
  currentTurn: 'Raps',
  isMyTurn: false,
  stockRemaining: 37,
  discardPileTop3: ['7♣', 'Q♦', '4♠'],
  opponents: [
    { id: 'Alexa', handCount: 7, active: true, connected: true },
    { id: 'Steve', handCount: 6, active: false, connected: true },
    { id: 'Morgan', handCount: 8, active: false, connected: false },
  ],
  myHand: ['3♠','4♠','5♠','J♥','Q♥','9♦','A♣'],
  myMelds: [['10♣','J♣'].length ? [] : []], // contoh kosong di awal
  selected: new Set()
};

function parseCard(str) {
  if (str.startsWith('JOKER')) return { rank:'JOKER', suit:null, isJoker:true };
  const suit = str.slice(-1);
  const rank = str.slice(0, -1);
  return { rank, suit, isJoker:false };
}

function renderCardEl(cardStr, opts = {}) {
  const { rank, suit, isJoker } = parseCard(cardStr);
  const el = document.createElement('div');
  el.className = 'pcard ' + (isJoker ? 'joker' : SUIT_COLOR[suit]);
  if (opts.extraClass) el.className += ' ' + opts.extraClass;

  if (isJoker) {
    el.textContent = '🃏';
  } else {
    const rankEl = document.createElement('div');
    rankEl.className = 'rank';
    rankEl.textContent = rank;
    const suitEl = document.createElement('div');
    suitEl.className = 'suit';
    suitEl.textContent = suit;
    el.appendChild(rankEl);
    el.appendChild(suitEl);
  }
  return el;
}

function render() {
  // Top bar
  document.getElementById('turnIndicator').textContent = 'Giliran: ' + state.currentTurn;
  document.getElementById('turnIndicator').classList.toggle('my-turn', state.isMyTurn);
  const phaseLabels = { DRAW: 'Ambil Kartu', MELD: 'Susun Kombinasi', DISCARD: 'Buang Kartu' };
  document.getElementById('phaseTag').textContent = phaseLabels[state.phase] || state.phase;

  // Opponents
  const row = document.getElementById('opponentsRow');
  row.innerHTML = '';
  state.opponents.forEach(op => {
    const div = document.createElement('div');
    div.className = 'opponent' + (op.active ? ' active-turn' : '');
    const initials = op.id.slice(0, 2).toUpperCase();
    div.innerHTML = `
      <div class="avatar">${initials}</div>
      <div class="name">${op.id}${!op.connected ? ' ⚠' : ''}</div>
      <div class="hand-mini">${'<div class="mini-card"></div>'.repeat(Math.min(op.handCount, 10))}</div>
      ${!op.connected ? '<div class="disconnected-tag">putus koneksi</div>' : ''}
    `;
    row.appendChild(div);
  });

  // Stock pile
  document.getElementById('stockCount').textContent = state.stockRemaining + ' kartu';
  document.getElementById('stockPile').style.opacity = state.stockRemaining === 0 ? '0.3' : '1';
  document.getElementById('stockPile').style.pointerEvents = (state.isMyTurn && state.phase === 'DRAW') ? 'auto' : 'none';

  // Discard pile (cascading, max 3 terlihat)
  const dPile = document.getElementById('discardPile');
  dPile.innerHTML = '';
  state.discardPileTop3.forEach((c, i) => {
    const isTop = i === state.discardPileTop3.length - 1;
    const canEat = state.isMyTurn && state.phase === 'DRAW';
    const el = renderCardEl(c, { extraClass: 'dcard' + (canEat ? ' eatable' : '') });
    if (canEat) {
      const posFromTop = state.discardPileTop3.length - 1 - i;
      el.onclick = () => eatFromDiscard(posFromTop, c);
    }
    dPile.appendChild(el);
  });

  // My melds
  const meldsWrap = document.getElementById('myMelds');
  meldsWrap.innerHTML = '';
  state.myMelds.forEach(meld => {
    if (!meld.length) return;
    const group = document.createElement('div');
    group.className = 'meld-group';
    meld.forEach(c => group.appendChild(renderCardEl(c)));
    meldsWrap.appendChild(group);
  });

  // My hand
  const handRow = document.getElementById('handRow');
  handRow.innerHTML = '';
  state.myHand.forEach((c, idx) => {
    const selected = state.selected.has(idx);
    const el = renderCardEl(c, { extraClass: 'in-hand' + (selected ? ' selected' : '') });
    el.onclick = () => toggleSelect(idx);
    handRow.appendChild(el);
  });

  // Action buttons
  const myTurnActive = state.isMyTurn;
  setBtnEnabled('btnMeld',    myTurnActive && state.phase === 'MELD' && state.selected.size >= 3);
  setBtnEnabled('btnDiscard', myTurnActive && state.phase === 'MELD' && state.selected.size === 1);
  setBtnEnabled('btnClose',   myTurnActive && state.phase === 'MELD' && state.myHand.length === 1 && state.selected.size === 1);

  // Hint text
  document.getElementById('hintText').textContent = getHint();
}

function setBtnEnabled(id, enabled) {
  const btn = document.getElementById(id);
  btn.classList.toggle('enabled', !!enabled);
}

function getHint() {
  if (!state.isMyTurn) return `Menunggu giliran ${state.currentTurn}...`;
  if (state.phase === 'DRAW') return 'Ambil kartu dari stock atau klik kartu buangan untuk "makan".';
  if (state.phase === 'MELD') {
    if (state.selected.size === 0) return 'Pilih 3+ kartu untuk turun seri/kembar, atau pilih 1 kartu untuk dibuang.';
    if (state.selected.size >= 3) return `${state.selected.size} kartu dipilih — siap diturunkan sebagai kombinasi.`;
    if (state.selected.size === 1) return 'Klik "Buang Kartu" untuk mengakhiri giliran.';
  }
  return '';
}

function toggleSelect(idx) {
  if (!state.isMyTurn || state.phase !== 'MELD') return;
  if (state.selected.has(idx)) state.selected.delete(idx);
  else state.selected.add(idx);
  render();
}

/* ───────── ACTION HANDLERS — sambungkan ke WebSocket emit ───────── */

function drawFromStock() {
  if (!state.isMyTurn || state.phase !== 'DRAW') return;
  // TODO: socket.emit('draw_stock', { roomId, playerId })
  showToast('Mengambil kartu dari stock...');
  state.phase = 'MELD';
  render();
}

function eatFromDiscard(positionFromTop, cardLabel) {
  if (!state.isMyTurn || state.phase !== 'DRAW') return;
  // TODO: socket.emit('draw_discard', { roomId, playerId, positionFromTop })
  showToast(`Memakan kartu ${cardLabel}...`);
  state.phase = 'MELD';
  render();
}

function attemptMeld() {
  if (state.selected.size < 3) return;
  const cards = [...state.selected].sort((a,b)=>a-b).map(i => state.myHand[i]);
  // TODO: socket.emit('place_meld', { roomId, playerId, cardIds: cards })
  showToast(`Mengirim kombinasi: ${cards.join(', ')}`);
  state.selected.clear();
  render();
}

function attemptDiscard() {
  if (state.selected.size !== 1) return;
  const idx = [...state.selected][0];
  const card = state.myHand[idx];
  // TODO: socket.emit('discard', { roomId, playerId, cardId: card })
  showToast(`Membuang kartu ${card}`);
  state.selected.clear();
  render();
}

function attemptClose() {
  if (state.myHand.length !== 1) return;
  const card = state.myHand[0];
  // TODO: socket.emit('discard', { roomId, playerId, cardId: card, attemptClose: true })
  showToast(`Mencoba menutup game dengan ${card}!`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ───────── INISIALISASI DEMO ───────── */
// Set giliran saya untuk demo interaktif
state.isMyTurn = true;
state.phase = 'MELD';
render();
</script>

</body>
</html>
