<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Remi — Buat / Gabung Ruang</title>
<style>
  :root {
    --felt-dark:  #0D3B2E;
    --felt-light: #144A38;
    --felt-edge:  #0A2B21;
    --gold:       #D4AF37;
    --gold-dim:   #8A7530;
    --cream:      #F2E9D8;
    --cream-dim:  #C9BEA6;
    --card-red:   #C23B3B;
    --font-display: 'Source Serif Pro', Georgia, serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-mono);
    background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt-dark) 55%, var(--felt-edge) 100%);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card-panel {
    width: 100%;
    max-width: 420px;
    background: rgba(10, 30, 24, 0.92);
    border: 1px solid var(--gold-dim);
    border-radius: 14px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .title {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    color: var(--cream-dim);
    margin-bottom: 26px;
    letter-spacing: 0.04em;
  }

  .tabs { display: flex; gap: 8px; margin-bottom: 22px; }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 8px;
    border: 1px solid var(--gold-dim);
    color: var(--cream-dim);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .tab.active { background: rgba(212,175,55,0.15); border-color: var(--gold); color: var(--gold); }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    color: var(--cream);
    font-family: var(--font-mono);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .field input:focus { border-color: var(--gold); }
  .field input#joinCode { letter-spacing: 0.15em; text-transform: uppercase; }

  .panel-section { display: none; }
  .panel-section.active { display: block; }

  .options-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .option-chip {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    cursor: pointer;
    color: var(--cream-dim);
    transition: all 0.2s ease;
  }
  .option-chip.selected { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-primary:hover { box-shadow: 0 0 20px rgba(212,175,55,0.4); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .error-msg {
    color: var(--card-red);
    font-size: 12px;
    text-align: center;
    margin-top: 12px;
    min-height: 16px;
  }

  /* ───────── LOBBY (waiting room) ───────── */
  #lobbyView { display: none; }
  .lobby-code {
    text-align: center;
    margin-bottom: 22px;
  }
  .lobby-code .label { font-size: 11px; color: var(--cream-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .lobby-code .code {
    font-family: var(--font-display);
    font-size: 42px;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin: 6px 0;
  }
  .lobby-code .hint { font-size: 11px; color: var(--cream-dim); }

  .player-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .player-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    font-size: 13px;
  }
  .player-row .pname { display: flex; align-items: center; gap: 8px; }
  .player-row .host-tag { font-size: 9px; color: var(--gold); border: 1px solid var(--gold-dim); padding: 1px 6px; border-radius: 8px; }
  .player-row .ready-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cream-dim); }
  .player-row .ready-dot.ready { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .player-row .disconnected { color: var(--card-red); font-size: 10px; }

  .lobby-actions { display: flex; gap: 10px; }
  .btn-secondary {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    color: var(--cream-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .btn-secondary.active-ready { border-color: #4ade80; color: #4ade80; }

  .connection-status {
    text-align: center;
    font-size: 10px;
    color: var(--cream-dim);
    margin-top: 18px;
    letter-spacing: 0.05em;
  }
  .connection-status.online::before { content: '● '; color: #4ade80; }
  .connection-status.offline::before { content: '● '; color: var(--card-red); }
</style>
</head>
<body>

<div class="card-panel">

  <!-- ═══════ FORM CREATE/JOIN ═══════ -->
  <div id="formView">
    <div class="title">🃏 Remi</div>
    <div class="subtitle">Permainan Kartu Remi Indonesia</div>

    <div class="tabs">
      <div class="tab active" id="tabCreate" onclick="switchTab('create')">Buat Ruang</div>
      <div class="tab" id="tabJoin" onclick="switchTab('join')">Gabung Ruang</div>
    </div>

    <div class="field">
      <label>Nama Kamu</label>
      <input type="text" id="playerName" placeholder="Masukkan nama..." maxlength="20">
    </div>

    <!-- CREATE -->
    <div class="panel-section active" id="createSection">
      <div class="options-row">
        <div class="option-chip selected" data-mode="traditional" onclick="selectMode(this,'traditional')">Tradisional</div>
        <div class="option-chip" data-mode="tournament" onclick="selectMode(this,'tournament')">Turnamen</div>
      </div>
      <div class="options-row">
        <div class="option-chip" data-joker="false" onclick="selectJoker(this,false)">Tanpa Joker</div>
        <div class="option-chip selected" data-joker="true" onclick="selectJoker(this,true)">Dengan Joker</div>
      </div>
      <button class="btn-primary" onclick="doCreateRoom()">Buat Ruang Baru</button>
    </div>

    <!-- JOIN -->
    <div class="panel-section" id="joinSection">
      <div class="field">
        <label>Kode Undangan</label>
        <input type="text" id="joinCode" placeholder="Contoh: RMI-7XQ2" maxlength="8">
      </div>
      <button class="btn-primary" onclick="doJoinRoom()">Gabung ke Ruang</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="connection-status offline" id="connStatus">Menghubungkan ke server...</div>
  </div>

  <!-- ═══════ LOBBY / WAITING ROOM ═══════ -->
  <div id="lobbyView">
    <div class="lobby-code">
      <div class="label">Kode Ruang — Bagikan ke teman</div>
      <div class="code" id="lobbyCodeDisplay">-----</div>
      <div class="hint">Minimal 2 pemain untuk mulai</div>
    </div>

    <div class="player-list" id="playerList"></div>

    <div class="lobby-actions">
      <button class="btn-secondary" id="btnReady" onclick="toggleReady()">Siap Main</button>
      <button class="btn-secondary" id="btnStart" onclick="doStartGame()" style="display:none;">Mulai Permainan</button>
    </div>

    <div class="error-msg" id="lobbyError"></div>
  </div>

</div>

<script src="client.js"></script>
<script>
let selectedMode = 'traditional';
let selectedJoker = true;
let amHost = false;
let myReady = false;

function switchTab(tab) {
  document.getElementById('tabCreate').classList.toggle('active', tab === 'create');
  document.getElementById('tabJoin').classList.toggle('active', tab === 'join');
  document.getElementById('createSection').classList.toggle('active', tab === 'create');
  document.getElementById('joinSection').classList.toggle('active', tab === 'join');
}

function selectMode(el, mode) {
  document.querySelectorAll('[data-mode]').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedMode = mode;
}
function selectJoker(el, val) {
  document.querySelectorAll('[data-joker]').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedJoker = val;
}

function showError(msg, target='errorMsg') {
  document.getElementById(target).textContent = msg;
  setTimeout(() => { document.getElementById(target).textContent = ''; }, 4000);
}

function doCreateRoom() {
  const name = document.getElementById('playerName').value.trim();
  if (!name) return showError('Masukkan nama kamu dulu');
  RemiClient.createRoom(name, { mode: selectedMode, useJokers: selectedJoker, maxPlayers: 4 });
}

function doJoinRoom() {
  const name = document.getElementById('playerName').value.trim();
  const code = document.getElementById('joinCode').value.trim();
  if (!name) return showError('Masukkan nama kamu dulu');
  if (!code) return showError('Masukkan kode undangan');
  RemiClient.joinRoom(code, name);
}

function toggleReady() {
  myReady = !myReady;
  RemiClient.setReady(myReady);
}

function doStartGame() {
  RemiClient.startGame();
}

function renderLobby(room) {
  document.getElementById('formView').style.display = 'none';
  document.getElementById('lobbyView').style.display = 'block';
  document.getElementById('lobbyCodeDisplay').textContent = room.code;

  const myId = RemiClient.getSession().playerId;
  amHost = room.hostId === myId;

  const list = document.getElementById('playerList');
  list.innerHTML = '';
  room.players.forEach(p => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <div class="pname">
        <span class="ready-dot ${p.ready ? 'ready' : ''}"></span>
        ${p.name}
        ${p.isHost ? '<span class="host-tag">HOST</span>' : ''}
      </div>
      ${!p.connected ? '<span class="disconnected">putus koneksi</span>' : ''}
    `;
    list.appendChild(row);
  });

  const me = room.players.find(p => p.id === myId);
  myReady = me ? me.ready : false;
  document.getElementById('btnReady').textContent = myReady ? '✓ Siap' : 'Siap Main';
  document.getElementById('btnReady').classList.toggle('active-ready', myReady);

  document.getElementById('btnStart').style.display = amHost ? 'block' : 'none';
  const allReady = room.players.every(p => p.ready) && room.players.length >= 2;
  document.getElementById('btnStart').disabled = !allReady;
}

// ───────── WebSocket events ─────────
RemiClient.on('connected', () => {
  document.getElementById('connStatus').textContent = 'Terhubung ke server';
  document.getElementById('connStatus').className = 'connection-status online';
});
RemiClient.on('disconnected', () => {
  document.getElementById('connStatus').textContent = 'Koneksi putus — mencoba lagi...';
  document.getElementById('connStatus').className = 'connection-status offline';
});

RemiClient.on('room_created', (msg) => renderLobby(msg.room));
RemiClient.on('room_joined',  (msg) => renderLobby(msg.room));
RemiClient.on('lobby_update', (msg) => renderLobby(msg.room));
RemiClient.on('reconnected',  (msg) => {
  renderLobby(msg.room);
  if (msg.snapshot) {
    // Sudah di tengah permainan → arahkan ke meja
    window.location.href = 'game.html';
  }
});

RemiClient.on('game_started', () => {
  window.location.href = 'game.html';
});

RemiClient.on('error', (msg) => {
  const target = document.getElementById('lobbyView').style.display === 'block' ? 'lobbyError' : 'errorMsg';
  showError(msg.message, target);
});

RemiClient.connect();
</script>
</body>
</html>
