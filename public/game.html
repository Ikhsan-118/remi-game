<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Remi — Meja Permainan</title>
<style>
  :root {
    --felt-dark:    #0D3B2E;
    --felt-light:   #144A38;
    --felt-edge:    #0A2B21;
    --gold:         #D4AF37;
    --gold-dim:     #8A7530;
    --cream:        #F2E9D8;
    --cream-dim:    #C9BEA6;
    --card-red:     #C23B3B;
    --card-black:   #1A1A1A;
    --card-face:    #FBF8F0;
    --panel-bg:     rgba(10, 30, 24, 0.88);
    --shadow-deep:  rgba(0, 0, 0, 0.55);
    --green-ready:  #4ade80;
    --font-display: 'Source Serif Pro', Georgia, serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-mono);
    background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt-dark) 55%, var(--felt-edge) 100%);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.025) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.02) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .table-wrap {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 14px 14px 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ───────── TOP BAR ───────── */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--panel-bg);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    margin-bottom: 12px;
    gap: 12px;
  }
  .room-info { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .room-info .label { font-size: 10px; letter-spacing: 0.12em; color: var(--cream-dim); text-transform: uppercase; }
  .room-info .code  { font-family: var(--font-display); font-size: 18px; color: var(--gold); letter-spacing: 0.06em; }

  .turn-indicator {
    font-family: var(--font-display);
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--gold-dim);
    background: rgba(212,175,55,0.06);
    color: var(--cream);
    transition: all 0.3s ease;
    text-align: center;
    flex: 1;
  }
  .turn-indicator.my-turn {
    background: rgba(212,175,55,0.22);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 16px rgba(212,175,55,0.25);
  }

  .phase-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream-dim);
    text-align: right;
    flex-shrink: 0;
  }
  .phase-tag .phase-name { color: var(--gold); display: block; font-size: 13px; margin-top: 2px; }

  /* ───────── OPPONENTS ROW ───────── */
  .opponents-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 10px 0 18px;
    flex-wrap: wrap;
  }
  .opponent {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.75;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .opponent.active-turn { opacity: 1; transform: translateY(-3px); }
  .opponent .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--felt-light), var(--felt-edge));
    border: 2px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 17px; color: var(--gold);
  }
  .opponent.active-turn .avatar { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,175,55,0.4); }
  .opponent .name { font-size: 11px; color: var(--cream-dim); text-align: center; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .opponent.active-turn .name { color: var(--cream); }
  .opponent .hand-mini { display: flex; }
  .opponent .mini-card {
    width: 13px; height: 19px;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    margin-left: -5px;
  }
  .opponent .mini-card:first-child { margin-left: 0; }
  .opponent .card-count { font-size: 10px; color: var(--cream-dim); }
  .opponent .disconnected-tag { font-size: 9px; color: var(--card-red); }

  /* ───────── CENTER TABLE ───────── */
  .center-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 10px 0 20px;
  }

  .piles-row {
    display: flex;
    align-items: center;
    gap: 48px;
  }

  .pile-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .pile-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cream-dim); }

  /* Stock pile */
  .stock-pile {
    position: relative;
    width: 58px; height: 82px;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .stock-pile:hover:not(.disabled) { transform: translateY(-2px); }
  .stock-pile.disabled { cursor: not-allowed; opacity: 0.45; }
  .stock-pile .stack-card {
    position: absolute;
    width: 58px; height: 82px;
    border-radius: 6px;
    background: linear-gradient(135deg, #232323, #161616);
    border: 1px solid var(--gold-dim);
    box-shadow: 0 4px 10px var(--shadow-deep);
  }
  .stock-pile .stack-card::after {
    content: '◆';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold-dim); font-size: 18px; opacity: 0.5;
  }
  .stock-count { font-family: var(--font-display); font-size: 13px; color: var(--gold); }

  /* Discard pile */
  .discard-pile { position: relative; width: 110px; height: 86px; }
  .discard-pile .dcard { position: absolute; width: 58px; height: 82px; transition: transform 0.2s ease; }
  .discard-pile .dcard:nth-last-child(1) { left: 26px; top: 0; z-index: 3; }
  .discard-pile .dcard:nth-last-child(2) { left: 13px; top: 2px; z-index: 2; opacity: 0.85; }
  .discard-pile .dcard:nth-last-child(3) { left: 0; top: 4px; z-index: 1; opacity: 0.65; }
  .discard-pile .dcard.eatable { cursor: pointer; }
  .discard-pile .dcard.eatable:hover { transform: translateY(-6px) scale(1.04); z-index: 10; }

  /* ───────── PLAYING CARD ───────── */
  .pcard {
    width: 58px; height: 82px;
    border-radius: 6px;
    background: var(--card-face);
    border: 1px solid rgba(0,0,0,0.15);
    box-shadow: 0 3px 6px var(--shadow-deep);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 5px 6px;
    font-family: var(--font-display);
    font-weight: 600;
    position: relative;
  }
  .pcard.red   { color: var(--card-red); }
  .pcard.black { color: var(--card-black); }
  .pcard .rank { font-size: 16px; line-height: 1; }
  .pcard .suit { font-size: 16px; line-height: 1; align-self: flex-end; }
  .pcard.joker {
    background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
    color: #1a1a1a;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    letter-spacing: 0;
  }

  /* ───────── MY HAND ───────── */
  .my-zone {
    background: var(--panel-bg);
    border-top: 1px solid var(--gold-dim);
    padding: 14px 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .my-melds {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    min-height: 0;
    padding: 0 4px;
  }
  .meld-group {
    display: flex;
    padding: 4px;
    border-radius: 6px;
    background: rgba(212,175,55,0.06);
    border: 1px dashed var(--gold-dim);
  }
  .meld-group .pcard {
    width: 40px; height: 58px;
    margin-left: -12px;
    box-shadow: 0 2px 5px var(--shadow-deep);
  }
  .meld-group .pcard:first-child { margin-left: 0; }
  .meld-group .pcard .rank,
  .meld-group .pcard .suit { font-size: 11px; }

  .hand-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding: 8px 0 4px;
    min-height: 100px;
    flex-wrap: nowrap;
    overflow-x: auto;
  }
  .pcard.in-hand {
    margin-left: -18px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    flex-shrink: 0;
  }
  .pcard.in-hand:first-child { margin-left: 0; }
  .pcard.in-hand:hover {
    transform: translateY(-8px);
    z-index: 5;
    box-shadow: 0 8px 14px var(--shadow-deep);
  }
  .pcard.in-hand.selected {
    transform: translateY(-16px);
    border: 2px solid var(--gold);
    box-shadow: 0 0 14px rgba(212,175,55,0.45), 0 8px 14px var(--shadow-deep);
    z-index: 6;
  }

  /* ───────── ACTION BAR ───────── */
  .action-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 4px;
  }
  .btn {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 11px 20px;
    border-radius: 24px;
    border: 1px solid var(--gold-dim);
    background: rgba(212,175,55,0.06);
    color: var(--cream-dim);
    cursor: not-allowed;
    opacity: 0.35;
    transition: all 0.2s ease;
    pointer-events: none;
  }
  .btn.enabled {
    cursor: pointer;
    opacity: 1;
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(212,175,55,0.12);
    pointer-events: auto;
  }
  .btn.enabled:hover {
    background: var(--gold);
    color: #1a1a1a;
    box-shadow: 0 0 16px rgba(212,175,55,0.45);
  }
  .btn.enabled:active { transform: scale(0.97); }
  .btn.danger.enabled { border-color: var(--card-red); color: var(--card-red); }
  .btn.danger.enabled:hover { background: var(--card-red); color: var(--cream); }

  .hint-text {
    text-align: center;
    font-size: 11px;
    color: var(--cream-dim);
    letter-spacing: 0.03em;
    min-height: 16px;
    padding: 0 8px;
  }

  /* ───────── SELECTION INFO ───────── */
  .selection-info {
    text-align: center;
    font-size: 11px;
    color: var(--gold);
    min-height: 14px;
    letter-spacing: 0.03em;
  }

  /* ───────── TOAST ───────── */
  .toast {
    position: fixed;
    bottom: 230px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(10,30,24,0.95);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 50;
    white-space: nowrap;
    max-width: 90vw;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--card-red); color: var(--card-red); }

  /* ───────── GAME OVER OVERLAY ───────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .overlay-box {
    background: rgba(10,30,24,0.97);
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 28px 24px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .overlay-box h2 { font-family: var(--font-display); color: var(--gold); margin-bottom: 16px; font-size: 22px; }
  .score-list { list-style: none; margin: 12px 0; }
  .score-list li {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    font-size: 13px;
  }
  .score-list li .pts { color: var(--gold); font-weight: bold; }
  .overlay-btn {
    margin-top: 18px;
    padding: 12px 28px;
    background: var(--gold);
    color: #1a1a1a;
    border: none;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .overlay-btn:hover { box-shadow: 0 0 16px rgba(212,175,55,0.4); }

  @media (max-width: 560px) {
    .pcard { width: 46px; height: 66px; }
    .pcard .rank, .pcard .suit { font-size: 13px; }
    .pcard.in-hand { margin-left: -22px; }
    .piles-row { gap: 28px; }
    .opponents-row { gap: 16px; }
    .btn { padding: 9px 14px; font-size: 11px; }
    .topbar { flex-wrap: wrap; }
    .turn-indicator { font-size: 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="table-wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="room-info">
      <span class="label">Kode Ruang</span>
      <span class="code" id="roomCode">-----</span>
    </div>
    <div class="turn-indicator" id="turnIndicator">Memuat...</div>
    <div class="phase-tag">
      Fase
      <span class="phase-name" id="phaseTag">-</span>
    </div>
  </div>

  <!-- OPPONENTS -->
  <div class="opponents-row" id="opponentsRow">
    <div style="font-size:12px;color:var(--cream-dim);">Memuat pemain...</div>
  </div>

  <!-- CENTER TABLE -->
  <div class="center-area">
    <div class="piles-row">
      <div class="pile-block">
        <div class="stock-pile disabled" id="stockPile" onclick="drawFromStock()">
          <div class="stack-card" style="transform:translateY(2px) translateX(2px);opacity:0.5;"></div>
          <div class="stack-card" style="transform:translateY(1px) translateX(1px);opacity:0.75;"></div>
          <div class="stack-card"></div>
        </div>
        <span class="stock-count" id="stockCount">-- kartu</span>
        <span class="pile-label">Stock</span>
      </div>

      <div class="pile-block">
        <div class="discard-pile" id="discardPile">
          <div style="width:58px;height:82px;border:1px dashed var(--gold-dim);border-radius:6px;opacity:0.4;"></div>
        </div>
        <span class="pile-label">Buangan</span>
      </div>
    </div>
  </div>

  <!-- MY ZONE -->
  <div class="my-zone">
    <div class="my-melds" id="myMelds"></div>

    <div class="hand-row" id="handRow">
      <div style="font-size:12px;color:var(--cream-dim);">Menunggu kartu...</div>
    </div>

    <div class="selection-info" id="selectionInfo"></div>
    <div class="hint-text" id="hintText">Menunggu permainan dimulai...</div>

    <div class="action-bar">
      <button class="btn" id="btnMeld"    onclick="attemptMeld()">Turun Seri</button>
      <button class="btn" id="btnDiscard" onclick="attemptDiscard()">Buang Kartu</button>
      <button class="btn danger" id="btnClose" onclick="attemptClose()">Tutup Game</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- GAME OVER OVERLAY -->
<div class="overlay" id="overlayGameOver">
  <div class="overlay-box">
    <h2 id="overlayTitle">🏁 Putaran Selesai</h2>
    <p id="overlaySubtitle" style="font-size:12px;color:var(--cream-dim);margin-bottom:12px;"></p>
    <ul class="score-list" id="overlayScores"></ul>
    <p style="font-size:11px;color:var(--cream-dim);margin-top:10px;">Total Akumulasi:</p>
    <ul class="score-list" id="overlayTotal"></ul>
    <button class="overlay-btn" onclick="goToLobby()">Kembali ke Lobby</button>
  </div>
</div>

<script src="client.js"></script>
<script>
/* =====================================================
   KONSTANTA & HELPER
   ===================================================== */

const SUIT_COLOR   = { '♠': 'black', '♣': 'black', '♥': 'red', '♦': 'red' };
const PHASE_LABELS = { DRAW: 'Ambil Kartu', MELD: 'Susun / Buang', GAME_OVER: 'Selesai' };

// Redirect ke lobby jika tidak ada sesi
const _session = RemiClient.getSession();
if (!_session.playerId || !_session.roomCode) {
  window.location.href = 'lobby.html';
}

let myId   = _session.playerId;
let myName = '';

/* =====================================================
   STATE — disinkronkan dari server
   ===================================================== */
let state = {
  phase:           'DRAW',
  currentTurn:     '',      // ID pemain yang giliran
  currentTurnName: '',      // NAMA pemain yang giliran (FIX)
  isMyTurn:        false,
  stockRemaining:  0,
  discardPileTop3: [],
  opponents:       [],      // { id, name, handCount, active, connected }
  myHand:          [],
  myMelds:         [],
  myHasBaseSeries: false,
  selected:        new Set()
};

/* =====================================================
   PARSE & RENDER KARTU
   ===================================================== */

/**
 * Parse string kartu: "7♠", "K♥", "JOKER_1", dll.
 * FIX: handle format JOKER_1 dan JOKER_2
 */
function parseCard(str) {
  if (!str) return null;
  if (str.startsWith('JOKER')) return { rank: 'JOKER', suit: null, isJoker: true, id: str };
  // Format: "10♠", "K♥", "A♦", dll.
  const suit = str.slice(-1);
  const rank = str.slice(0, -1);
  return { rank, suit, isJoker: false, id: str };
}

function renderCardEl(cardStr, opts = {}) {
  const c = parseCard(cardStr);
  if (!c) return document.createElement('div');

  const el = document.createElement('div');
  el.className = 'pcard ' + (c.isJoker ? 'joker' : (SUIT_COLOR[c.suit] || 'black'));
  if (opts.extraClass) el.className += ' ' + opts.extraClass;
  el.dataset.cardId = cardStr;

  if (c.isJoker) {
    el.textContent = '🃏';
  } else {
    const rankEl = document.createElement('div');
    rankEl.className = 'rank';
    rankEl.textContent = c.rank;
    const suitEl = document.createElement('div');
    suitEl.className = 'suit';
    suitEl.textContent = c.suit;
    el.appendChild(rankEl);
    el.appendChild(suitEl);
  }
  return el;
}

/* =====================================================
   RENDER UTAMA
   ===================================================== */

function render() {
  // TOP BAR
  const roomCode = RemiClient.getSession().roomCode || '-----';
  document.getElementById('roomCode').textContent = roomCode;

  // FIX: Tampilkan NAMA pemain, bukan ID
  const turnName = state.isMyTurn ? 'Giliranmu!' : `Giliran: ${state.currentTurnName || '...'}`;
  const turnEl = document.getElementById('turnIndicator');
  turnEl.textContent = turnName;
  turnEl.classList.toggle('my-turn', state.isMyTurn);

  document.getElementById('phaseTag').textContent = PHASE_LABELS[state.phase] || state.phase;

  // OPPONENTS
  renderOpponents();

  // STOCK
  document.getElementById('stockCount').textContent = state.stockRemaining + ' kartu';
  const stockEl = document.getElementById('stockPile');
  const canDraw = state.isMyTurn && state.phase === 'DRAW' && state.stockRemaining > 0;
  stockEl.classList.toggle('disabled', !canDraw);

  // DISCARD PILE
  renderDiscardPile();

  // MY MELDS
  renderMyMelds();

  // MY HAND
  renderMyHand();

  // BUTTONS
  updateButtons();

  // HINT
  document.getElementById('hintText').textContent = getHint();
}

function renderOpponents() {
  const row = document.getElementById('opponentsRow');
  row.innerHTML = '';

  if (!state.opponents || state.opponents.length === 0) {
    row.innerHTML = '<div style="font-size:12px;color:var(--cream-dim);">-</div>';
    return;
  }

  state.opponents.forEach(op => {
    const div = document.createElement('div');
    div.className = 'opponent' + (op.active ? ' active-turn' : '');

    // FIX: Gunakan nama (op.name), bukan op.id
    const initials = (op.name || op.id || '?').slice(0, 2).toUpperCase();
    const displayName = op.name || op.id || '?';
    const cardCount = Math.min(op.handCount, 12);

    div.innerHTML = `
      <div class="avatar">${initials}</div>
      <div class="name" title="${displayName}">${displayName}</div>
      <div class="hand-mini">
        ${'<div class="mini-card"></div>'.repeat(cardCount)}
      </div>
      <div class="card-count">${op.handCount} kartu</div>
      ${!op.connected ? '<div class="disconnected-tag">⚠ putus</div>' : ''}
    `;
    row.appendChild(div);
  });
}

function renderDiscardPile() {
  const dPile = document.getElementById('discardPile');
  dPile.innerHTML = '';

  if (!state.discardPileTop3 || state.discardPileTop3.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'width:58px;height:82px;border:1px dashed var(--gold-dim);border-radius:6px;opacity:0.4;';
    dPile.appendChild(empty);
    return;
  }

  const canEat = state.isMyTurn && state.phase === 'DRAW';

  state.discardPileTop3.forEach((c, i) => {
    const el = renderCardEl(c, { extraClass: 'dcard' + (canEat ? ' eatable' : '') });
    if (canEat) {
      // positionFromTop: kartu paling akhir di array = paling atas = posisi 0
      const posFromTop = state.discardPileTop3.length - 1 - i;
      el.onclick = () => eatFromDiscard(posFromTop, c);
      el.title = posFromTop === 0 ? 'Klik untuk makan kartu ini' : `Makan tengah (posisi ${posFromTop})`;
    }
    dPile.appendChild(el);
  });
}

function renderMyMelds() {
  const meldsWrap = document.getElementById('myMelds');
  meldsWrap.innerHTML = '';

  if (!state.myMelds || state.myMelds.length === 0) return;

  state.myMelds.forEach(meld => {
    if (!meld || !meld.length) return;
    const group = document.createElement('div');
    group.className = 'meld-group';
    meld.forEach(c => group.appendChild(renderCardEl(c)));
    meldsWrap.appendChild(group);
  });
}

function renderMyHand() {
  const handRow = document.getElementById('handRow');
  handRow.innerHTML = '';

  if (!state.myHand || state.myHand.length === 0) {
    handRow.innerHTML = '<div style="font-size:12px;color:var(--cream-dim);padding:8px;">Tangan kosong</div>';
    return;
  }

  state.myHand.forEach((c, idx) => {
    const selected = state.selected.has(idx);
    const el = renderCardEl(c, { extraClass: 'in-hand' + (selected ? ' selected' : '') });
    el.onclick = () => toggleSelect(idx);
    el.title = c + (selected ? ' (dipilih)' : '');
    handRow.appendChild(el);
  });

  // Tampilkan info seleksi
  const selInfo = document.getElementById('selectionInfo');
  if (state.selected.size > 0) {
    const selectedCards = [...state.selected].map(i => state.myHand[i]).join(', ');
    selInfo.textContent = `Dipilih (${state.selected.size}): ${selectedCards}`;
  } else {
    selInfo.textContent = '';
  }
}

function updateButtons() {
  const myTurn   = state.isMyTurn;
  const isMeld   = state.phase === 'MELD';
  const sel      = state.selected.size;
  const handLen  = state.myHand.length;

  // Turun Seri: giliran saya, fase MELD, pilih ≥3 kartu
  setBtnEnabled('btnMeld',    myTurn && isMeld && sel >= 3);

  // Buang Kartu: giliran saya, fase MELD, pilih tepat 1 kartu
  setBtnEnabled('btnDiscard', myTurn && isMeld && sel === 1);

  // Tutup Game: giliran saya, fase MELD, sisa 1 kartu di tangan, pilih 1 kartu
  // dan sudah punya dasar seri
  setBtnEnabled('btnClose',
    myTurn && isMeld && handLen === 1 && sel === 1 && state.myHasBaseSeries
  );
}

function setBtnEnabled(id, enabled) {
  document.getElementById(id).classList.toggle('enabled', !!enabled);
}

function getHint() {
  if (state.phase === 'GAME_OVER') return '🏁 Permainan selesai.';
  if (!state.isMyTurn) return `Menunggu giliran ${state.currentTurnName || '...'}...`;

  if (state.phase === 'DRAW') {
    return 'Klik stock (kiri) untuk ambil kartu, atau klik kartu buangan untuk "makan".';
  }
  if (state.phase === 'MELD') {
    const sel = state.selected.size;
    if (sel === 0) {
      return state.myHasBaseSeries
        ? 'Pilih 3+ kartu untuk turun seri/kembar, atau 1 kartu untuk dibuang.'
        : 'Pilih 3+ kartu seri untuk dijadikan dasar seri pertama.';
    }
    if (sel === 1) {
      return state.myHand.length === 1 && state.myHasBaseSeries
        ? 'Klik "Tutup Game" untuk menutup permainan, atau "Buang Kartu" untuk buang biasa.'
        : 'Klik "Buang Kartu" untuk mengakhiri giliran.';
    }
    if (sel >= 3) {
      return `${sel} kartu dipilih — klik "Turun Seri" untuk meletakkan kombinasi.`;
    }
    return `${sel} kartu dipilih.`;
  }
  return '';
}

/* =====================================================
   ACTION HANDLERS
   ===================================================== */

function toggleSelect(idx) {
  if (!state.isMyTurn || state.phase !== 'MELD') {
    showToast('Bukan giliranmu atau bukan fase pemilihan kartu', true);
    return;
  }
  if (state.selected.has(idx)) {
    state.selected.delete(idx);
  } else {
    state.selected.add(idx);
  }
  render();
}

function drawFromStock() {
  if (!state.isMyTurn || state.phase !== 'DRAW') return;
  if (state.stockRemaining === 0) {
    showToast('Stock pile sudah habis!', true);
    return;
  }
  RemiClient.drawStock();
}

function eatFromDiscard(positionFromTop, cardLabel) {
  if (!state.isMyTurn || state.phase !== 'DRAW') return;
  RemiClient.drawDiscard(positionFromTop);
  showToast(`Mengambil ${cardLabel} dari buangan...`);
}

function attemptMeld() {
  if (state.selected.size < 3) return;
  const cardIds = [...state.selected].sort((a, b) => a - b).map(i => state.myHand[i]);
  RemiClient.placeMeld(cardIds);
  state.selected.clear();
}

function attemptDiscard() {
  if (state.selected.size !== 1) return;
  const idx    = [...state.selected][0];
  const cardId = state.myHand[idx];
  RemiClient.discardCard(cardId, false);
  state.selected.clear();
}

function attemptClose() {
  if (state.myHand.length !== 1 || state.selected.size !== 1) return;
  const idx    = [...state.selected][0];
  const cardId = state.myHand[idx];

  if (!confirm(`Tutup game dengan kartu ${cardId}?\n(Pastikan kamu ambil kartu ini dari buangan lawan)`)) {
    return;
  }
  RemiClient.discardCard(cardId, true);
  showToast(`Mencoba menutup game dengan ${cardId}!`);
}

function goToLobby() {
  RemiClient.clearSession();
  window.location.href = 'lobby.html';
}

/* =====================================================
   TOAST
   ===================================================== */
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* =====================================================
   SINKRONISASI DARI SERVER
   ===================================================== */

/**
 * Terapkan snapshot publik dari server.
 * FIX: Gunakan currentTurnName (nama) bukan currentTurn (ID).
 * FIX: Map id→name dari snapshot.players agar opponents tampil nama.
 */
function applyPublicSnapshot(snapshot) {
  if (!snapshot) return;

  state.phase           = snapshot.phase;
  state.currentTurn     = snapshot.currentTurn;
  state.currentTurnName = snapshot.currentTurnName || snapshot.currentTurn; // FIX
  state.isMyTurn        = snapshot.currentTurn === myId;
  state.stockRemaining  = snapshot.stockRemaining;
  state.discardPileTop3 = snapshot.discardPileTop3 || [];

  // FIX: Gunakan name dari snapshot.players untuk opponents
  state.opponents = (snapshot.players || [])
    .filter(p => p.id !== myId)
    .map(p => ({
      id:        p.id,
      name:      p.name || p.id, // FIX: pakai nama, bukan ID
      handCount: p.handCount,
      active:    p.id === snapshot.currentTurn,
      connected: p.connected
    }));

  render();
}

// State update publik (broadcast ke semua)
RemiClient.on('state_update', (msg) => {
  applyPublicSnapshot(msg.snapshot);
});

// Game dimulai → terapkan snapshot awal
RemiClient.on('game_started', (msg) => {
  applyPublicSnapshot(msg.snapshot);
  showToast(`Game dimulai! Giliran pertama: ${msg.snapshot?.currentTurnName || '...'}`);
});

// Kartu tangan pribadi (hanya untuk saya)
RemiClient.on('private_hand', (msg) => {
  state.myHand         = msg.hand  || [];
  state.myMelds        = msg.melds || [];
  state.myHasBaseSeries = !!msg.hasBaseSeries;
  state.selected.clear();
  render();
});

// Putaran selesai → tampilkan overlay skor
RemiClient.on('round_over', (msg) => {
  showGameOverOverlay(msg);
  state.phase = 'GAME_OVER';
  updateButtons();
});

// Error dari server
RemiClient.on('error', (msg) => {
  showToast('⚠ ' + msg.message, true);
});

// Koneksi
RemiClient.on('disconnected', () => {
  showToast('Koneksi putus, mencoba menyambung ulang...', true);
});
RemiClient.on('connected', () => {
  // Tidak perlu toast tiap connect (termasuk reconnect)
});

// Pemain lain disconnect/reconnect
RemiClient.on('player_disconnected', (msg) => {
  showToast(`⚠ ${msg.playerName || msg.playerId} terputus koneksi`, true);
});
RemiClient.on('player_reconnected', (msg) => {
  showToast(`✓ ${msg.playerName || msg.playerId} kembali terhubung`);
});

// Reconnect: jika ada snapshot, terapkan
RemiClient.on('reconnected', (msg) => {
  if (msg.snapshot) {
    applyPublicSnapshot(msg.snapshot);
    if (msg.snapshot.myHand) {
      state.myHand         = msg.snapshot.myHand;
      state.myMelds        = msg.snapshot.myMelds || [];
      state.myHasBaseSeries = !!msg.snapshot.myHasBaseSeries;
    }
    render();
    showToast('Berhasil menyambung kembali!');
  } else if (msg.room && msg.room.status === 'LOBBY') {
    window.location.href = 'lobby.html';
  }
});

/* =====================================================
   GAME OVER OVERLAY
   ===================================================== */
function showGameOverOverlay(data) {
  const overlay = document.getElementById('overlayGameOver');
  const title   = document.getElementById('overlayTitle');
  const sub     = document.getElementById('overlaySubtitle');
  const scores  = document.getElementById('overlayScores');
  const total   = document.getElementById('overlayTotal');

  if (data.stockEmpty) {
    title.textContent = '📦 Stock Habis!';
    sub.textContent = 'Putaran berakhir karena stock pile kosong.';
  } else {
    title.textContent = '🏆 Permainan Selesai!';
    sub.textContent = `${data.winnerName || data.winner} berhasil menutup permainan!`;
  }

  scores.innerHTML = '';
  if (data.roundScores) {
    data.roundScores.forEach(s => {
      const li = document.createElement('li');
      const name = s.playerId === myId ? `${s.playerId} (kamu)` : s.playerId;
      li.innerHTML = `<span>${name}</span><span class="pts">${s.total > 0 ? '+' : ''}${s.total}</span>`;
      scores.appendChild(li);
    });
  }

  total.innerHTML = '';
  if (data.totalScores) {
    Object.entries(data.totalScores).forEach(([id, pts]) => {
      const li = document.createElement('li');
      const name = id === myId ? `${id} (kamu)` : id;
      li.innerHTML = `<span>${name}</span><span class="pts">${pts}</span>`;
      total.appendChild(li);
    });
  }

  overlay.classList.add('show');
}

/* =====================================================
   INIT
   ===================================================== */
RemiClient.connect();
render(); // render awal (kosong) agar halaman tidak blank
</script>
